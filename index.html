<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتاب ذكريات · دفعة 29</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #1a1008;
  --ink-light:  #3d2e1a;
  --parchment:  #f7f0e3;
  --parchment2: #efe5cc;
  --gold:       #9a7a2e;
  --gold-light: #c9a84c;
  --gold-pale:  #e8d5a0;
  --crimson:    #7a1e2e;
  --crimson-l:  #a02840;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #2a1f14; font-family: 'Noto Naskh Arabic', 'Amiri', serif; min-height: 100vh; }

/* TOOLBAR */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: #1a1008; border-bottom: 1px solid rgba(154,122,46,0.3);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
}
.toolbar-title { font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 1px; }
.dl-btn {
  display: flex; align-items: center; gap: 8px; padding: 10px 26px;
  background: var(--crimson); color: var(--parchment); border: none; border-radius: 4px;
  font-family: 'Noto Naskh Arabic', serif; font-size: 1rem; font-weight: 600;
  cursor: pointer; letter-spacing: 1px; transition: background 0.2s, transform 0.15s;
  box-shadow: 0 2px 12px rgba(122,30,46,0.4);
}
.dl-btn:hover { background: var(--crimson-l); transform: translateY(-1px); }

/* BOOK */
.book-wrap { padding: 80px 20px 60px; display: flex; flex-direction: column; align-items: center; gap: 32px; }

/* PAGE */
.page {
  width: 210mm; min-height: 297mm; position: relative;
  background: var(--parchment); box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  display: flex; flex-direction: column; overflow: hidden;
  page-break-after: always; break-after: page;
}
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
}

/* COVER */
.cover {
  background: var(--ink); color: var(--parchment);
  align-items: center; justify-content: center;
}
.cover::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(154,122,46,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(122,30,46,0.15) 0%, transparent 50%);
}
.cover-border { position: absolute; inset: 18px; border: 1px solid rgba(154,122,46,0.35); z-index: 2; }
.cover-border::before { content: ''; position: absolute; inset: 9px; border: 1px solid rgba(154,122,46,0.15); }

.cover-corner { position: absolute; width: 56px; height: 56px; z-index: 3; }
.cover-corner svg { width: 100%; height: 100%; }
.cover-corner.tl { top: 10px; right: 10px; }
.cover-corner.tr { top: 10px; left: 10px; transform: scaleX(-1); }
.cover-corner.bl { bottom: 10px; right: 10px; transform: scaleY(-1); }
.cover-corner.br { bottom: 10px; left: 10px; transform: scale(-1,-1); }

.cover-content {
  position: relative; z-index: 4; text-align: center;
  padding: 60px 50px; display: flex; flex-direction: column; align-items: center;
}
.cover-top-label { font-size: 0.72rem; letter-spacing: 6px; color: rgba(232,213,160,0.5); margin-bottom: 44px; }
.cover-ornament { color: var(--gold-light); font-size: 1.3rem; letter-spacing: 14px; opacity: 0.6; margin-bottom: 28px; }
.cover-rule { width: 160px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 32px; }
.cover-main-title { font-family: 'Amiri', serif; font-size: 5rem; font-weight: 700; color: var(--parchment); line-height: 1; margin-bottom: 10px; letter-spacing: 3px; }
.cover-main-sub { font-family: 'Amiri', serif; font-size: 1.9rem; color: var(--gold-light); margin-bottom: 30px; font-style: italic; }
.cover-rule2 { width: 70px; height: 2px; background: var(--crimson); margin: 0 auto 32px; opacity: 0.8; }
.cover-tagline { font-family: 'Amiri', serif; font-size: 1.1rem; color: rgba(232,213,160,0.6); line-height: 2.1; max-width: 340px; margin-bottom: 56px; }
.cover-dots { color: rgba(154,122,46,0.4); font-size: 1rem; letter-spacing: 8px; margin-bottom: 52px; }
.cover-footer { border-top: 1px solid rgba(154,122,46,0.2); padding-top: 24px; width: 100%; text-align: center; }
.cover-batch { font-size: 0.72rem; letter-spacing: 5px; color: rgba(232,213,160,0.4); margin-bottom: 8px; }
.cover-year { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; }

/* DEDICATION */
.dedication { background: var(--parchment2); align-items: center; justify-content: center; }
.ded-border { position: absolute; inset: 24px; border: 1px solid rgba(154,122,46,0.18); pointer-events: none; z-index: 1; }
.ded-content { text-align: center; padding: 80px 70px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
.ded-glyph { font-size: 2.2rem; color: var(--gold); opacity: 0.5; margin-bottom: 36px; }
.ded-rule { width: 90px; height: 1px; background: var(--gold); opacity: 0.35; margin: 0 auto 40px; }
.ded-text { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 2.5; color: var(--ink-light); max-width: 460px; }
.ded-text em { color: var(--crimson); font-style: normal; font-weight: 700; }
.ded-rule2 { width: 50px; height: 2px; background: var(--crimson); margin: 42px auto 28px; opacity: 0.45; }
.ded-from { font-size: 0.72rem; color: var(--gold); letter-spacing: 4px; opacity: 0.6; }

/* MEMORY PAGE */
.mem-page { background: var(--parchment); }
.mem-corner { position: absolute; width: 28px; height: 28px; z-index: 2; }
.mem-corner.tl { top: 52px; right: 26px; border-top: 1px solid rgba(154,122,46,0.28); border-right: 1px solid rgba(154,122,46,0.28); }
.mem-corner.tr { top: 52px; left: 26px; border-top: 1px solid rgba(154,122,46,0.28); border-left: 1px solid rgba(154,122,46,0.28); }
.mem-corner.bl { bottom: 42px; right: 26px; border-bottom: 1px solid rgba(154,122,46,0.28); border-right: 1px solid rgba(154,122,46,0.28); }
.mem-corner.br { bottom: 42px; left: 26px; border-bottom: 1px solid rgba(154,122,46,0.28); border-left: 1px solid rgba(154,122,46,0.28); }

.running-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 42px 14px; border-bottom: 1px solid rgba(154,122,46,0.18); position: relative; z-index: 2;
}
.rh-text { font-size: 0.62rem; letter-spacing: 4px; color: var(--gold); opacity: 0.55; }
.rh-rule { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(154,122,46,0.18), transparent); margin: 0 16px; }

.mem-content {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 50px 80px; position: relative; z-index: 2; text-align: center;
}
.mem-bg-num {
  font-family: 'Amiri', serif; font-size: 9rem; font-weight: 700;
  color: rgba(154,122,46,0.055); line-height: 1; position: absolute; top: 24px;
  left: 50%; transform: translateX(-50%); letter-spacing: -4px; user-select: none;
}
.mem-star { font-size: 0.9rem; color: var(--gold); letter-spacing: 14px; opacity: 0.45; margin-bottom: 38px; }
.mem-name { font-family: 'Amiri', serif; font-size: 2.9rem; font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 22px; }
.mem-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 38px; justify-content: center; }
.mem-divider-line { height: 1px; width: 56px; background: var(--gold); opacity: 0.38; }
.mem-divider-dot { width: 6px; height: 6px; background: var(--crimson); transform: rotate(45deg); opacity: 0.55; }
.mem-message { font-family: 'Amiri', serif; font-size: 1.22rem; line-height: 2.3; color: var(--ink-light); max-width: 430px; font-style: italic; }

.running-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 42px 18px; border-top: 1px solid rgba(154,122,46,0.18); position: relative; z-index: 2;
}
.rf-text { font-size: 0.62rem; letter-spacing: 3px; color: var(--gold); opacity: 0.45; }
.page-num { font-family: 'Amiri', serif; font-size: 0.9rem; color: var(--gold); opacity: 0.55; }

/* LOADING */
.loading-screen {
  position: fixed; inset: 0; background: #1a1008;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999;
}
.loading-title { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--gold-light); }
.loading-sub { font-size: 0.82rem; color: rgba(232,213,160,0.38); letter-spacing: 3px; }
.loading-bar-wrap { width: 200px; height: 2px; background: rgba(154,122,46,0.2); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: var(--gold-light); border-radius: 2px; animation: lb 1.8s ease-in-out infinite; }
@keyframes lb { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

/* MODAL */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-box { background: var(--ink); border: 1px solid rgba(154,122,46,0.3); border-radius: 8px; padding: 44px; text-align: center; max-width: 370px; width: 90%; }
.modal-icon { font-size: 2.6rem; margin-bottom: 16px; }
.modal-title { font-family: 'Amiri', serif; font-size: 1.5rem; color: var(--parchment); margin-bottom: 12px; }
.modal-text { font-size: 0.88rem; color: rgba(232,213,160,0.52); line-height: 1.95; margin-bottom: 28px; }
.modal-text strong { color: var(--gold-light); }
.modal-btn { width: 100%; padding: 13px; background: var(--crimson); color: var(--parchment); border: none; border-radius: 4px; font-family: 'Noto Naskh Arabic', serif; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 10px; letter-spacing: 1px; transition: background 0.2s; }
.modal-btn:hover { background: var(--crimson-l); }
.modal-cancel { background: none; border: none; color: rgba(232,213,160,0.28); font-family: 'Noto Naskh Arabic', serif; font-size: 0.85rem; cursor: pointer; transition: color 0.2s; }
.modal-cancel:hover { color: rgba(232,213,160,0.55); }

@media print {
  @page { size: A4; margin: 0; }
  .toolbar, .loading-screen, .modal { display: none !important; }
  body { background: none; }
  .book-wrap { padding: 0; gap: 0; }
  .page { width: 210mm; min-height: 297mm; box-shadow: none; margin: 0; page-break-after: always; break-after: page; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-title">كتاب الذكريات</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-sub">جاري تحميل الذكريات...</div>
</div>

<div class="toolbar">
  <div class="toolbar-title">📖 كتاب ذكريات · دفعة 29</div>
  <button class="dl-btn" onclick="document.getElementById('modal').classList.add('show')">⬇ تنزيل PDF</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-icon">📄</div>
    <div class="modal-title">تنزيل كتاب PDF</div>
    <div class="modal-text">في نافذة الطباعة،<br>اختار <strong>"حفظ كـ PDF"</strong> من قائمة الطابعات<br>ثم اضغط حفظ ⬇</div>
    <button class="modal-btn" onclick="document.getElementById('modal').classList.remove('show'); window.print();">افتح نافذة الحفظ</button>
    <button class="modal-cancel" onclick="document.getElementById('modal').classList.remove('show')">إلغاء</button>
  </div>
</div>

<div class="book-wrap" id="book" style="display:none"></div>

<script>
const SUPABASE_URL = 'https://qryfzlsrjbgbalyxdjhd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyeWZ6bHNyamJnYmFseXhkamhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI4MTMsImV4cCI6MjA5MTUwODgxM30.Ezfy8YQU6Mg6Xx70pDPFNOI2spcSGJU9GOb3q6IMr_s';

const cornerSVG = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 2 L2 32 M2 2 L32 2" stroke="rgba(154,122,46,0.45)" stroke-width="1"/>
  <path d="M9 9 L9 24 M9 9 L24 9" stroke="rgba(154,122,46,0.2)" stroke-width="0.6"/>
  <circle cx="2" cy="2" r="1.8" fill="rgba(154,122,46,0.55)"/>
  <circle cx="9" cy="9" r="1.1" fill="rgba(154,122,46,0.3)"/>
</svg>`;

async function build() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/memories?order=created_at.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const memories = res.ok ? await res.json() : [];
  const book = document.getElementById('book');

  // COVER
  const cover = document.createElement('div');
  cover.className = 'page cover';
  cover.innerHTML = `
    <div class="cover-border"></div>
    <div class="cover-corner tl">${cornerSVG}</div>
    <div class="cover-corner tr">${cornerSVG}</div>
    <div class="cover-corner bl">${cornerSVG}</div>
    <div class="cover-corner br">${cornerSVG}</div>
    <div class="cover-content">
      <div class="cover-top-label">كلية التمريض · جامعة المنصورة</div>
      <div class="cover-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
      <div class="cover-rule"></div>
      <div class="cover-main-title">ذكريات</div>
      <div class="cover-main-sub">لحظات لن تُنسى</div>
      <div class="cover-rule2"></div>
      <div class="cover-tagline">
        في هذه الصفحات ذكريات جيل كامل،<br>
        كلمات حُفرت في القلب قبل الورق،<br>
        وأسماء ستبقى ما بقي الزمن.
      </div>
      <div class="cover-dots">· · · · ·</div>
      <div class="cover-footer">
        <div class="cover-batch">الدفعة التاسعة والعشرون</div>
        <div class="cover-year">٢٠٢٦</div>
      </div>
    </div>`;
  book.appendChild(cover);

  // DEDICATION
  const ded = document.createElement('div');
  ded.className = 'page dedication';
  ded.innerHTML = `
    <div class="ded-border"></div>
    <div class="ded-content">
      <div class="ded-glyph">❦</div>
      <div class="ded-rule"></div>
      <div class="ded-text">
        إلى كل من حمل الكتاب بيد،<br>
        والأمل بيد أخرى...<br><br>
        إلى من تعب وصبر ونجح،<br>
        إلى <em>دفعة 29</em>،<br>
        أُهدي هذه الكلمات.<br><br>
        <span style="font-size:1rem; opacity:0.65;">ما كان جميلاً، يستحق أن يُحفظ.</span>
      </div>
      <div class="ded-rule2"></div>
      <div class="ded-from">كلية التمريض · جامعة المنصورة · 2026</div>
    </div>`;
  book.appendChild(ded);

  // MEMORY PAGES
  memories.forEach((item, i) => {
    const name = (item.name || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const msg  = (item.message || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const num  = String(i + 1).padStart(2, '0');

    const pg = document.createElement('div');
    pg.className = 'page mem-page';
    pg.innerHTML = `
      <div class="mem-corner tl"></div>
      <div class="mem-corner tr"></div>
      <div class="mem-corner bl"></div>
      <div class="mem-corner br"></div>
      <div class="running-header">
        <div class="rh-text">دفعة 29 · كلية التمريض</div>
        <div class="rh-rule"></div>
        <div class="rh-text">ذكريات لن تُنسى</div>
      </div>
      <div class="mem-content">
        <div class="mem-bg-num">${num}</div>
        <div class="mem-star">✦</div>
        <div class="mem-name">${name}</div>
        <div class="mem-divider">
          <div class="mem-divider-line"></div>
          <div class="mem-divider-dot"></div>
          <div class="mem-divider-line"></div>
        </div>
        <div class="mem-message">${msg}</div>
      </div>
      <div class="running-footer">
        <div class="rf-text">جامعة المنصورة · 2026</div>
        <div class="page-num">${i + 1}</div>
      </div>`;
    book.appendChild(pg);
  });

  document.getElementById('loading').style.display = 'none';
  book.style.display = 'flex';
}

build();
</script>
</body>
</html>
